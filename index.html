<!DOCTYPE html>
<html>
<head>
  <title>Deepak Live Share Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      padding: 10px 15px;
      background: rgba(0,0,0,0.2);
      color: white;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: center;
    }

    .room-info {
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    input {
      padding: 6px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    textarea {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    .recent {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      background: white;
      color: #333;
      padding: 4px 8px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 12px;
    }

    .footer {
      text-align: center;
      padding: 6px;
      color: white;
      font-size: 12px;
      background: rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<div class="header">

  <div class="top-row">
    <div><b>🔥 Live Share Pro</b></div>
    <div class="room-info" id="roomName"></div>
  </div>

  <div class="controls">
    <input id="roomInput" placeholder="Enter room name..." />
    <button onclick="joinRoom()">Join</button>
    <button onclick="copyLink()">Copy Link</button>
    <button onclick="copyText()">Copy</button>
    <button onclick="downloadFile('txt')">.txt</button>
  </div>

  <div class="recent" id="recentRooms"></div>

</div>

<textarea id="sharedText" placeholder="Start typing..."></textarea>

<div class="footer">Multi-room • No login 🚀</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    
  apiKey: "AIzaSyDjbuA8ZqC4afKH9Nl-R_hDRRrYy1Utbjk",
  authDomain: "text-share-app-1ea19.firebaseapp.com",
  databaseURL: "https://text-share-app-1ea19-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "text-share-app-1ea19",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ROOM
if (!location.hash) location.hash = "default";
const room = location.hash.replace("#", "");

document.getElementById("roomName").innerText =
  room === "default" ? "🌍 Public Room" : "Room: " + room;

const textarea = document.getElementById("sharedText");
const textRef = ref(db, "sharedText/" + room);

// SAVE RECENT
let recent = JSON.parse(localStorage.getItem("rooms") || "[]");
if (!recent.includes(room)) {
  recent.unshift(room);
  recent = recent.slice(0, 5);
  localStorage.setItem("rooms", JSON.stringify(recent));
}

// SHOW RECENT
const recentDiv = document.getElementById("recentRooms");
recent.forEach(r => {
  const el = document.createElement("div");
  el.className = "tag";
  el.innerText = r;
  el.onclick = () => location.hash = r;
  recentDiv.appendChild(el);
});

// SYNC
let typing = false;

textarea.addEventListener("input", () => {
  typing = true;
  set(textRef, textarea.value);
  setTimeout(() => typing = false, 300);
});

onValue(textRef, snap => {
  if (!typing) textarea.value = snap.val() || "";
});

// FUNCTIONS
window.joinRoom = () => {
  const val = document.getElementById("roomInput").value.trim();
  if (val) location.hash = val;
};

window.copyLink = () => {
  navigator.clipboard.writeText(location.href);
  alert("Link copied!");
};

window.copyText = () => {
  navigator.clipboard.writeText(textarea.value);
};

window.downloadFile = (type) => {
  const blob = new Blob([textarea.value]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "file." + type;
  a.click();
};
</script>

</body>
</html>
