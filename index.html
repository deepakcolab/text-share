<!DOCTYPE html>
<html>
<head>
  <title>Deepak Live Share</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(0,0,0,0.2);
      color: white;
      font-size: 18px;
      font-weight: bold;
      gap: 10px;
      flex-wrap: wrap;
    }

    .room-info {
      font-size: 14px;
      opacity: 0.9;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      background: white;
      color: #333;
      transition: 0.2s;
    }

    button:hover {
      background: #f0f0f0;
      transform: scale(1.05);
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      padding: 20px;
      font-size: 16px;
      box-sizing: border-box;
      resize: none;
    }

    .footer {
      text-align: center;
      padding: 8px;
      background: rgba(0,0,0,0.2);
      color: white;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div class="header">
    🔥 Live Shared Text

    <div class="room-info" id="roomName"></div>

    <div class="btn-group">
      <button onclick="copyText()">Copy</button>
      <button onclick="copyLink()">Share Link</button>
      <button onclick="downloadFile('txt')">.txt</button>
      <button onclick="downloadFile('cs')">.cs</button>
      <button onclick="downloadFile('html')">.html</button>
    </div>
  </div>

  <textarea id="sharedText" placeholder="Start typing..."></textarea>

  <div class="footer">
    Multi-room Live Share 🚀 (No Login)
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // 🔥 Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyDjbuA8ZqC4afKH9Nl-R_hDRRrYy1Utbjk",
    authDomain: "text-share-app-1ea19.firebaseapp.com",
    databaseURL: "https://text-share-app-1ea19-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "text-share-app-1ea19",
    storageBucket: "text-share-app-1ea19.appspot.com",
    messagingSenderId: "958767260499",
    appId: "1:958767260499:web:f8bcc3e371d5be0d45f7a6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 🔥 ROOM LOGIC (GitHub Pages compatible)
  if (!window.location.hash) {
    window.location.hash = "default";
  }

  const room = window.location.hash.replace("#", "");
  document.getElementById("roomName").innerText = "Room: " + room;

  const textRef = ref(db, "sharedText/" + room);
  const textarea = document.getElementById("sharedText");

  // 🔥 Prevent overwrite lag
  let isTyping = false;

  textarea.addEventListener("input", () => {
    isTyping = true;
    set(textRef, textarea.value);
    setTimeout(() => isTyping = false, 300);
  });

  onValue(textRef, (snapshot) => {
    if (!isTyping) {
      textarea.value = snapshot.val() || "";
    }
  });

  // 🔥 Copy Text
  window.copyText = function () {
    navigator.clipboard.writeText(textarea.value);
  };

  // 🔥 Copy Share Link
  window.copyLink = function () {
    navigator.clipboard.writeText(window.location.href);
    alert("Share link copied!");
  };

  // 🔥 Download
  window.downloadFile = function (type) {
    const text = textarea.value;
    const blob = new Blob([text], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "shared-file." + type;
    link.click();
  };
</script>

</body>
</html>
